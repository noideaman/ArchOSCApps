# .github/workflows/build.yml
name: Build Nuitka Binaries

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: OSCLeash-linux
            output-ext: ""
          - os: windows-latest
            artifact-name: OSCLeash-windows
            output-ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Install ViGEmBus SDK (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install vigembus -y
          start-sleep -Seconds 5
        shell: pwsh

      # --- Checkout OSCLeash ---
      - name: Checkout script repo
        uses: actions/checkout@v4
        with:
          repository: ZenithVal/OSCLeash       # ← the script repo
          path: OSCLeash


      # --- Python + Nuitka setup ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pip install setuptools wheel
          pip install vgamepad --no-build-isolation
          pip install -r OSCLeash/requirements.txt
          # Pre-install ziglang and zstandard so Nuitka doesn't prompt
          pip install nuitka ziglang zstandard

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          pip install nuitka ziglang zstandard
          pip install -r OSCLeash/requirements.txt

      # --- Linux: C compiler tooling ---
      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y patchelf ccache

      # --- Build ---
      - name: Build with Nuitka (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --follow-imports \
            --output-filename=OSCLeash \
            --output-dir=dist \
            OSCLeash/OSCLeash.py
        
      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          python -m nuitka ^
            --standalone ^
            --onefile ^
            --follow-imports ^
            --assume-yes-for-downloads ^
            --include-package=vgamepad ^
            --output-filename=OSCLeash.exe ^
            --output-dir=dist ^
            OSCLeash\OSCLeash.py

      # --- Upload ---
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/myapp${{ matrix.output-ext }}
          retention-days: 30
